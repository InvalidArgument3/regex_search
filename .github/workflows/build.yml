name: Build

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to create/update release for (example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      jar_name: ${{ steps.jar_meta.outputs.jar_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Capture built JAR metadata
        id: jar_meta
        shell: bash
        run: |
          set -euo pipefail
          jar_path=$(ls -1 build/libs/*.jar | grep -vE '(-sources|-javadoc)\.jar$' | head -n1)
          echo "jar_name=$(basename "$jar_path")" >> "$GITHUB_OUTPUT"

      - name: Upload built JAR
        uses: actions/upload-artifact@v4
        with:
          name: built-jar
          path: build/libs/*.jar
          if-no-files-found: error

  release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download built JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: built-jar
          path: dist

      - name: Create or update release with built JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          files: dist/${{ needs.build.outputs.jar_name }}
          generate_release_notes: true
